
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Binder Design Analysis Report</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: Arial, sans-serif;
            }
            .container {
                display: flex;
                width: 100%;
                height: 100vh;
                overflow: hidden;
            }
            #sidebar {
                width: 250px;
                background-color: #f5f5f5;
                height: 100%;
                overflow-y: auto;
                padding: 20px;
                box-sizing: border-box;
                flex-shrink: 0;
                box-shadow: 2px 0 5px rgba(0,0,0,0.1);
                z-index: 100;
            }
            #content {
                flex-grow: 1;
                height: 100%;
                overflow: hidden;
                position: relative;
            }
            iframe {
                width: 100%;
                height: 100%;
                border: none;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
            #sidebar h2 {
                margin-top: 0;
                border-bottom: 1px solid #ddd;
                padding-bottom: 10px;
            }
            #sidebar ul {
                list-style-type: none;
                padding: 0;
                margin-top: 20px;
            }
            #sidebar li {
                margin-bottom: 10px;
            }
            #sidebar a {
                text-decoration: none;
                color: #0066cc;
                padding: 8px 5px;
                display: block;
                border-radius: 5px;
                transition: background-color 0.2s;
            }
            #sidebar a:hover {
                background-color: #e0e0e0;
            }
            .active {
                background-color: #e0e0e0;
                font-weight: bold;
            }
            .toggle-sidebar {
                position: absolute;
                top: 10px;
                left: 10px;
                z-index: 200;
                background: #f5f5f5;
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 5px 10px;
                display: none;
                cursor: pointer;
            }
            @media (max-width: 768px) {
                #sidebar {
                    position: fixed;
                    left: -250px;
                    transition: left 0.3s ease;
                }
                #sidebar.show {
                    left: 0;
                }
                #content {
                    margin-left: 0;
                    width: 100%;
                }
                .toggle-sidebar {
                    display: block;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="sidebar">
                <h2>Analysis Plots</h2>
                <ul>
    <li><a href="javascript:void(0)" class="active" onclick="loadIframe('mipae_histograms.html', 'Minimum Interaction PAE Histograms')">Minimum Interaction PAE Histograms</a></li>
<li><a href="javascript:void(0)" class="" onclick="loadIframe('rmsd_histograms.html', 'RMSD to RFdiffusion Histograms')">RMSD to RFdiffusion Histograms</a></li>
<li><a href="javascript:void(0)" class="" onclick="loadIframe('plddt_histograms.html', 'Mean Binder pLDDT Histograms')">Mean Binder pLDDT Histograms</a></li>
<li><a href="javascript:void(0)" class="" onclick="loadIframe('iptm_histograms.html', 'Interface pTM Histograms')">Interface pTM Histograms</a></li>
<li><a href="javascript:void(0)" class="" onclick="loadIframe('intrachain_pae_histograms.html', 'Mean Binder Intrachain PAE Histograms')">Mean Binder Intrachain PAE Histograms</a></li>
<li><a href="javascript:void(0)" class="" onclick="loadIframe('3d_scatter.html', '3D Design Space Visualization')">3D Design Space Visualization</a></li>

                </ul>
            </div>
            <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
            <div id="content">
                <iframe id="plot-frame" src="mipae_histograms.html" allowfullscreen></iframe>
            </div>
        </div>
        <script>
            function loadIframe(file, name) {
                const iframe = document.getElementById('plot-frame');
                iframe.src = file;
                document.title = 'Binder Analysis: ' + name;
                
                // Update active class
                const links = document.querySelectorAll('#sidebar a');
                links.forEach(link => link.classList.remove('active'));
                
                // Find the clicked link
                const clickedLink = Array.from(links).find(link => 
                    link.textContent === name);
                if (clickedLink) clickedLink.classList.add('active');
                
                // Close sidebar on mobile after selection
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('show');
                }
            }
            
            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('show');
            }
            
            // Force iframe content to resize when iframe loads
            document.getElementById('plot-frame').addEventListener('load', function() {
                try {
                    const innerWindow = this.contentWindow;
                    if (innerWindow && innerWindow.Plotly) {
                        const gd = innerWindow.document.querySelector('.plotly-graph-div');
                        if (gd) {
                            innerWindow.Plotly.Plots.resize(gd);
                        }
                    }
                } catch (e) {
                    console.error('Error resizing plot:', e);
                }
            });
            
            // Handle window resize
            window.addEventListener('resize', function() {
                try {
                    const iframe = document.getElementById('plot-frame');
                    const innerWindow = iframe.contentWindow;
                    if (innerWindow && innerWindow.Plotly) {
                        const gd = innerWindow.document.querySelector('.plotly-graph-div');
                        if (gd) {
                            innerWindow.Plotly.Plots.resize(gd);
                        }
                    }
                } catch (e) {
                    console.error('Error resizing plot:', e);
                }
            });
            
            // Initialize
            document.addEventListener('DOMContentLoaded', function() {
                document.title = 'Binder Analysis: Minimum Interaction PAE Histograms';
            });
        </script>
    </body>
    </html>
